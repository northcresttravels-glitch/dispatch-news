<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dispatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Inconsolata:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --paper:#f8f3ea; --cream:#ede6d6; --ink:#141210; --ink2:#2e2a25;
  --rule:#1a1714; --red:#9b1c1c; --gold:#7a6020; --muted:#7a7168; --divider:#bdb5a4;
}
body { background:var(--paper); color:var(--ink); font-family:'Source Serif 4',Georgia,serif; min-height:100vh; }
.ticker-bar { background:var(--ink); color:#e8e0d0; padding:7px 0; overflow:hidden; border-bottom:2px solid var(--red); display:none; }
.ticker-track { display:flex; width:max-content; animation:ticker 70s linear infinite; }
.ticker-track:hover { animation-play-state:paused; }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.tick { font-family:'Inconsolata',monospace; font-size:11.5px; letter-spacing:0.04em; padding:0 40px; white-space:nowrap; border-right:1px solid #333; }
.tick::before { content:'◆ '; color:var(--red); font-size:8px; }
.masthead-meta { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:12px 40px 10px; border-bottom:1px solid var(--divider); }
.meta-l,.meta-r { font-family:'Inconsolata',monospace; font-size:10.5px; letter-spacing:0.08em; color:var(--muted); text-transform:uppercase; }
.meta-r { text-align:right; }
.live-badge { display:inline-flex; align-items:center; gap:5px; background:var(--red); color:#fff; font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:0.15em; padding:3px 10px; text-transform:uppercase; }
.live-dot { width:6px; height:6px; border-radius:50%; background:#fff; animation:blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.nameplate-wrap { text-align:center; padding:14px 40px 12px; border-bottom:4px double var(--rule); }
.deco { font-family:'Inconsolata',monospace; font-size:11px; color:var(--divider); letter-spacing:0.3em; display:block; }
.nameplate { font-family:'UnifrakturMaguntia',cursive; font-size:clamp(52px,8.5vw,104px); line-height:1; display:block; margin:2px 0; }
.tagline { font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:0.35em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
.section-nav { display:flex; overflow-x:auto; scrollbar-width:none; border-bottom:2px solid var(--rule); background:var(--paper); }
.section-nav::-webkit-scrollbar { display:none; }
.nav-btn { font-family:'Inconsolata',monospace; font-size:11px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; padding:11px 20px; border:none; background:transparent; color:var(--muted); cursor:pointer; border-right:1px solid var(--divider); white-space:nowrap; transition:all 0.12s; }
.nav-btn:hover { color:var(--ink); background:var(--cream); }
.nav-btn.active { background:var(--ink); color:var(--paper); }
.wrap { max-width:1380px; margin:0 auto; padding:26px 32px 60px; }
.bar { display:flex; justify-content:space-between; align-items:center; padding-bottom:14px; margin-bottom:22px; border-bottom:1px solid var(--divider); }
.bar-label { font-family:'Inconsolata',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
.bar-label strong { color:var(--red); margin-left:6px; }
.bar-right { display:flex; align-items:center; gap:14px; }
.updated { font-family:'Inconsolata',monospace; font-size:10px; color:var(--muted); }
.refresh-btn { font-family:'Inconsolata',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; padding:7px 16px; border:1px solid var(--ink); background:transparent; color:var(--ink); cursor:pointer; transition:all 0.12s; }
.refresh-btn:hover { background:var(--ink); color:var(--paper); }
.refresh-btn:disabled { opacity:0.35; cursor:not-allowed; }
.loading { text-align:center; padding:80px 0; }
.loading-rule { height:1px; background:linear-gradient(90deg,transparent,var(--divider),transparent); margin:18px auto; width:160px; }
.loading-text { font-family:'Source Serif 4',serif; font-style:italic; font-size:18px; color:var(--muted); animation:fp 1.7s ease-in-out infinite; }
@keyframes fp { 0%,100%{opacity:0.35} 50%{opacity:1} }
.grid { display:grid; grid-template-columns:repeat(12,1fr); border:1px solid var(--divider); }
.story { padding:24px; border:1px solid var(--divider); transition:background 0.12s; animation:up 0.4s ease both; }
.story:hover { background:var(--cream); }
@keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.story:nth-child(1){animation-delay:0.04s} .story:nth-child(2){animation-delay:0.09s}
.story:nth-child(3){animation-delay:0.14s} .story:nth-child(4){animation-delay:0.19s}
.story:nth-child(5){animation-delay:0.24s} .story:nth-child(6){animation-delay:0.29s}
.s-lead { grid-column:span 8; border-right:2px solid var(--rule); border-bottom:2px solid var(--rule); padding:32px; }
.s-side { grid-column:span 4; border-bottom:2px solid var(--rule); }
.s-third { grid-column:span 4; }
.s-half { grid-column:span 6; }
.kicker { font-family:'Inconsolata',monospace; font-size:10px; font-weight:600; letter-spacing:0.22em; text-transform:uppercase; color:var(--red); display:block; margin-bottom:8px; }
.headline { font-family:'Source Serif 4',serif; font-weight:700; line-height:1.2; color:var(--ink); margin-bottom:10px; }
.s-lead .headline { font-size:clamp(21px,2.6vw,34px); }
.s-side .headline { font-size:18px; }
.s-third .headline { font-size:15px; }
.s-half .headline { font-size:17px; }
.deck { font-family:'Source Serif 4',serif; font-size:14px; font-weight:300; line-height:1.72; color:var(--ink2); }
.s-lead .deck { font-size:15px; max-width:560px; }
.byline { margin-top:14px; font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:0.06em; color:var(--muted); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.source { color:var(--gold); font-weight:600; }
.byline-rule { flex:1; height:1px; background:var(--divider); min-width:16px; }
.read-more { display:inline-block; margin-top:12px; font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--red); text-decoration:none; border-bottom:1px solid currentColor; transition:color 0.1s; }
.read-more:hover { color:var(--ink); }
.error-box { border:1.5px solid var(--red); background:#fff9f8; padding:30px; font-family:'Inconsolata',monospace; font-size:13px; line-height:1.7; color:var(--red); margin:40px auto; max-width:520px; text-align:center; }
footer { max-width:1380px; margin:0 auto; padding:16px 32px 40px; border-top:3px double var(--rule); display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px; }
footer span { font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
@media(max-width:860px) {
  .s-lead,.s-side,.s-third,.s-half { grid-column:span 12; }
  .s-lead { border-right:1px solid var(--divider); }
  .wrap { padding:16px 14px 40px; }
  .masthead-meta { grid-template-columns:1fr 1fr; }
  .meta-l { display:none; }
}
</style>
</head>
<body>
<div class="ticker-bar" id="tickerBar"><div class="ticker-track" id="tickerTrack"></div></div>
<header>
  <div class="masthead-meta">
    <span class="meta-l" id="dateStr"></span>
    <span class="live-badge"><span class="live-dot"></span>Live Search</span>
    <span class="meta-r">Real Sources · Verified</span>
  </div>
  <div class="nameplate-wrap">
    <span class="deco">— ✦ —</span>
    <span class="nameplate">The Dispatch</span>
    <div class="tagline">Independent · Verified · Continuous</div>
    <span class="deco">— ✦ —</span>
  </div>
</header>
<nav class="section-nav" id="nav">
  <button class="nav-btn active" data-s="world">World</button>
  <button class="nav-btn" data-s="politics">Politics</button>
  <button class="nav-btn" data-s="technology">Technology</button>
  <button class="nav-btn" data-s="business">Business</button>
  <button class="nav-btn" data-s="science">Science</button>
  <button class="nav-btn" data-s="sports">Sports</button>
  <button class="nav-btn" data-s="crypto">Crypto</button>
  <button class="nav-btn" data-s="entertainment">Entertainment</button>
  <button class="nav-btn" data-s="space">Space</button>
</nav>
<div class="wrap">
  <div class="bar">
    <span class="bar-label">Showing: <strong id="sectionTitle">World News</strong></span>
    <div class="bar-right">
      <span class="updated" id="updated"></span>
      <button class="refresh-btn" id="refreshBtn" onclick="reload()">↻ Refresh</button>
    </div>
  </div>
  <div id="container">
    <div class="loading">
      <div class="loading-rule"></div>
      <div class="loading-text">Gathering dispatches…</div>
      <div class="loading-rule"></div>
    </div>
  </div>
</div>
<footer>
  <span>© The Dispatch — Powered by live web search</span>
  <span>Real journalism · No AI filler</span>
</footer>
<script>
const LABELS = {
  world:'World News', politics:'Politics', technology:'Technology',
  business:'Business & Finance', science:'Science', sports:'Sports',
  crypto:'Crypto & Web3', entertainment:'Entertainment', space:'Space & Astronomy'
};
const LAYOUTS = ['s-lead','s-side','s-third','s-third','s-third','s-half'];
let current = 'world';

document.getElementById('dateStr').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

document.getElementById('nav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if (!btn) return;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  load(btn.dataset.s);
});

function showLoading(section) {
  document.getElementById('sectionTitle').textContent = LABELS[section] || section;
  document.getElementById('container').innerHTML = `
    <div class="loading">
      <div class="loading-rule"></div>
      <div class="loading-text">Searching for ${LABELS[section] || section}…</div>
      <div class="loading-rule"></div>
    </div>`;
}

function renderGrid(stories, section) {
  const doubled = [...stories, ...stories];
  document.getElementById('tickerTrack').innerHTML =
    doubled.map(s => `<span class="tick">${s.headline}</span>`).join('');
  document.getElementById('tickerBar').style.display = 'block';
  const kicker = LABELS[section] || section;
  const html = stories.map((s, i) => {
    const cls = LAYOUTS[i] || 's-third';
    const showDeck = ['s-lead','s-side','s-half'].includes(cls);
    const link = s.url ? `<a class="read-more" href="${s.url}" target="_blank" rel="noopener">Full story →</a>` : '';
    return `<article class="story ${cls}">
      <span class="kicker">${kicker}</span>
      <h2 class="headline">${s.headline}</h2>
      ${showDeck ? `<p class="deck">${s.deck}</p>` : ''}
      ${link}
      <div class="byline">
        <span class="source">${s.source}</span>
        <span class="byline-rule"></span>
        <span>${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>
      </div>
    </article>`;
  }).join('');
  document.getElementById('container').innerHTML = `<div class="grid">${html}</div>`;
  document.getElementById('updated').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

async function load(section) {
  current = section;
  showLoading(section);
  document.getElementById('refreshBtn').disabled = true;
  try {
    const res = await fetch(`/api/news?section=${encodeURIComponent(section)}`);
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Server error');
    renderGrid(data.stories, section);
  } catch (err) {
    document.getElementById('container').innerHTML = `<div class="error-box">⚠ ${err.message}</div>`;
  } finally {
    document.getElementById('refreshBtn').disabled = false;
  }
}

function reload() { load(current); }
load('world');
</script>
</body>
</html>
