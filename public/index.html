<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dispatch</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background:#f4f4f4; color:#111; }

/* TOP BAR */
.topbar { background:#111; color:#fff; padding:8px 20px; font-size:12px; display:flex; justify-content:space-between; align-items:center; }
.topbar span { opacity:0.6; }

/* HEADER */
header { background:#fff; border-bottom:3px solid #111; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
.logo { font-size:32px; font-weight:900; letter-spacing:-1px; color:#111; text-decoration:none; }
.logo span { color:#c00; }

/* NAV */
nav { background:#fff; border-bottom:1px solid #ddd; overflow-x:auto; white-space:nowrap; scrollbar-width:none; }
nav::-webkit-scrollbar { display:none; }
nav a { display:inline-block; padding:12px 16px; font-size:13px; font-weight:600; color:#333; text-decoration:none; text-transform:uppercase; letter-spacing:0.05em; border-bottom:3px solid transparent; }
nav a:hover { color:#c00; }
nav a.active { color:#c00; border-bottom-color:#c00; }

/* MAIN */
.container { max-width:1200px; margin:0 auto; padding:24px 16px; }

.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:10px; border-bottom:2px solid #111; }
.section-header h2 { font-size:20px; font-weight:800; text-transform:uppercase; letter-spacing:0.05em; }
.refresh-btn { background:#c00; color:#fff; border:none; padding:8px 16px; font-size:12px; font-weight:700; text-transform:uppercase; cursor:pointer; letter-spacing:0.05em; }
.refresh-btn:hover { background:#900; }
.refresh-btn:disabled { background:#999; cursor:not-allowed; }

/* GRID */
.grid { display:grid; grid-template-columns:repeat(12,1fr); gap:20px; }

/* LEAD STORY */
.story-lead { grid-column:span 8; background:#fff; cursor:pointer; }
.story-lead:hover .headline { color:#c00; }
.story-lead .image-wrap { width:100%; height:400px; overflow:hidden; background:#ddd; }
.story-lead .image-wrap img { width:100%; height:100%; object-fit:cover; }
.story-lead .content { padding:16px; }
.story-lead .headline { font-size:26px; font-weight:800; line-height:1.2; margin-bottom:10px; transition:color 0.1s; }
.story-lead .deck { font-size:15px; line-height:1.6; color:#444; margin-bottom:12px; }

/* SIDE STORIES */
.story-side { grid-column:span 4; display:flex; flex-direction:column; gap:16px; }
.story-small { background:#fff; cursor:pointer; display:flex; gap:12px; padding:12px; }
.story-small:hover .headline { color:#c00; }
.story-small .image-wrap { width:100px; height:75px; flex-shrink:0; overflow:hidden; background:#ddd; }
.story-small .image-wrap img { width:100%; height:100%; object-fit:cover; }
.story-small .content { flex:1; }
.story-small .headline { font-size:14px; font-weight:700; line-height:1.3; margin-bottom:6px; transition:color 0.1s; }

/* BOTTOM GRID */
.story-medium { grid-column:span 4; background:#fff; cursor:pointer; }
.story-medium:hover .headline { color:#c00; }
.story-medium .image-wrap { width:100%; height:180px; overflow:hidden; background:#ddd; }
.story-medium .image-wrap img { width:100%; height:100%; object-fit:cover; }
.story-medium .content { padding:12px; }
.story-medium .headline { font-size:16px; font-weight:700; line-height:1.3; margin-bottom:6px; transition:color 0.1s; }

/* SHARED */
.source-line { font-size:11px; color:#888; text-transform:uppercase; font-weight:600; letter-spacing:0.05em; margin-bottom:6px; }
.time { font-size:11px; color:#999; margin-top:6px; }
.no-image { width:100%; height:100%; background:#e8e8e8; display:flex; align-items:center; justify-content:center; font-size:12px; color:#999; }

/* LOADING */
.loading { text-align:center; padding:80px 0; }
.spinner { width:36px; height:36px; border:3px solid #ddd; border-top-color:#c00; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading p { font-size:14px; color:#666; }

/* ERROR */
.error { background:#fff3f3; border:1px solid #ffcccc; padding:24px; text-align:center; color:#c00; font-size:14px; margin:20px 0; }

/* ARTICLE PAGE */
.article-page { display:none; background:#fff; min-height:100vh; }
.article-page.open { display:block; }
.article-back { background:#111; color:#fff; padding:12px 20px; font-size:13px; font-weight:600; cursor:pointer; border:none; width:100%; text-align:left; }
.article-back:hover { background:#333; }
.article-hero { width:100%; max-height:480px; object-fit:cover; display:block; }
.article-body { max-width:720px; margin:0 auto; padding:32px 20px; }
.article-source { font-size:12px; font-weight:700; color:#c00; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:12px; }
.article-headline { font-size:clamp(24px,4vw,38px); font-weight:900; line-height:1.15; margin-bottom:16px; }
.article-meta { font-size:12px; color:#888; margin-bottom:24px; padding-bottom:24px; border-bottom:1px solid #eee; }
.article-deck { font-size:18px; line-height:1.6; color:#333; font-weight:400; margin-bottom:24px; padding-bottom:24px; border-bottom:1px solid #eee; }
.article-text p { font-size:16px; line-height:1.8; color:#222; margin-bottom:20px; }
.article-link { display:inline-block; margin-top:16px; background:#111; color:#fff; padding:12px 24px; font-size:13px; font-weight:700; text-decoration:none; text-transform:uppercase; letter-spacing:0.05em; }
.article-link:hover { background:#c00; }

/* GENERATING */
.generating { text-align:center; padding:60px 20px; }
.generating .spinner { margin:0 auto 16px; }
.generating p { font-size:15px; color:#666; }

footer { background:#111; color:#888; text-align:center; padding:24px; font-size:12px; margin-top:40px; }

@media(max-width:768px) {
  .story-lead { grid-column:span 12; }
  .story-lead .image-wrap { height:220px; }
  .story-lead .headline { font-size:20px; }
  .story-side { grid-column:span 12; }
  .story-medium { grid-column:span 12; }
}
</style>
</head>
<body>

<!-- ARTICLE PAGE (hidden by default) -->
<div class="article-page" id="articlePage">
  <button class="article-back" onclick="closeArticle()">← Back to The Dispatch</button>
  <div id="articleContent"></div>
</div>

<!-- MAIN PAGE -->
<div id="mainPage">
  <div class="topbar">
    <span id="dateStr"></span>
    <span id="updated"></span>
  </div>

  <header>
    <a class="logo" href="#">The <span>Dispatch</span></a>
  </header>

  <nav id="nav">
    <a href="#" class="active" data-s="world">World</a>
    <a href="#" data-s="politics">Politics</a>
    <a href="#" data-s="technology">Technology</a>
    <a href="#" data-s="business">Business</a>
    <a href="#" data-s="science">Science</a>
    <a href="#" data-s="sports">Sports</a>
    <a href="#" data-s="crypto">Crypto</a>
    <a href="#" data-s="entertainment">Entertainment</a>
    <a href="#" data-s="space">Space</a>
  </nav>

  <div class="container">
    <div class="section-header">
      <h2 id="sectionTitle">World News</h2>
      <button class="refresh-btn" id="refreshBtn" onclick="reload()">Refresh</button>
    </div>
    <div id="container"></div>
  </div>

  <footer>© The Dispatch — Real news from real sources</footer>
</div>

<script>
const LABELS = {
  world:'World News', politics:'Politics', technology:'Technology',
  business:'Business', science:'Science', sports:'Sports',
  crypto:'Crypto', entertainment:'Entertainment', space:'Space'
};

let current = 'world';
let currentStories = [];

document.getElementById('dateStr').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// Nav
document.getElementById('nav').addEventListener('click', e => {
  e.preventDefault();
  const a = e.target.closest('a');
  if (!a) return;
  document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
  a.classList.add('active');
  load(a.dataset.s);
});

function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
  if (diff < 60) return diff + 'm ago';
  if (diff < 1440) return Math.floor(diff/60) + 'h ago';
  return Math.floor(diff/1440) + 'd ago';
}

function imgHtml(url, alt) {
  if (url) return `<img src="${url}" alt="${alt}" onerror="this.parentElement.innerHTML='<div class=no-image>No image</div>'">`;
  return `<div class="no-image">No image</div>`;
}

function renderGrid(stories) {
  if (!stories.length) {
    document.getElementById('container').innerHTML = `<div class="error">No stories found. Try refreshing.</div>`;
    return;
  }

  currentStories = stories;
  const lead = stories[0];
  const smalls = stories.slice(1, 3);
  const mediums = stories.slice(3, 6);

  const html = `<div class="grid">
    <div class="story-lead" onclick="openArticle(0)">
      <div class="image-wrap">${imgHtml(lead.image, lead.headline)}</div>
      <div class="content">
        <div class="source-line">${lead.source}</div>
        <div class="headline">${lead.headline}</div>
        <div class="deck">${lead.deck}</div>
        <div class="time">${lead.publishedAt ? timeAgo(lead.publishedAt) : ''}</div>
      </div>
    </div>
    <div class="story-side">
      ${smalls.map((s,i) => `
        <div class="story-small" onclick="openArticle(${i+1})">
          <div class="image-wrap">${imgHtml(s.image, s.headline)}</div>
          <div class="content">
            <div class="source-line">${s.source}</div>
            <div class="headline">${s.headline}</div>
            <div class="time">${s.publishedAt ? timeAgo(s.publishedAt) : ''}</div>
          </div>
        </div>`).join('')}
    </div>
    ${mediums.map((s,i) => `
      <div class="story-medium" onclick="openArticle(${i+3})">
        <div class="image-wrap">${imgHtml(s.image, s.headline)}</div>
        <div class="content">
          <div class="source-line">${s.source}</div>
          <div class="headline">${s.headline}</div>
          <div class="deck">${s.deck ? s.deck.substring(0,100)+'...' : ''}</div>
          <div class="time">${s.publishedAt ? timeAgo(s.publishedAt) : ''}</div>
        </div>
      </div>`).join('')}
  </div>`;

  document.getElementById('container').innerHTML = html;
  document.getElementById('updated').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

async function openArticle(index) {
  const story = currentStories[index];
  if (!story) return;

  document.getElementById('mainPage').style.display = 'none';
  document.getElementById('articlePage').classList.add('open');

  document.getElementById('articleContent').innerHTML = `
    <div class="generating">
      <div class="spinner"></div>
      <p>Loading full article…</p>
    </div>`;

  try {
    const res = await fetch(`/api/article?headline=${encodeURIComponent(story.headline)}&deck=${encodeURIComponent(story.deck)}&source=${encodeURIComponent(story.source)}`);
    const data = await res.json();

    document.getElementById('articleContent').innerHTML = `
      ${story.image ? `<img class="article-hero" src="${story.image}" alt="${story.headline}" onerror="this.style.display='none'">` : ''}
      <div class="article-body">
        <div class="article-source">${story.source}</div>
        <h1 class="article-headline">${story.headline}</h1>
        <div class="article-meta">${story.publishedAt ? new Date(story.publishedAt).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) : ''}</div>
        <div class="article-deck">${story.deck}</div>
        <div class="article-text">${data.body}</div>
        ${story.url ? `<a class="article-link" href="${story.url}" target="_blank" rel="noopener">Read original at ${story.source} →</a>` : ''}
      </div>`;
  } catch(err) {
    document.getElementById('articleContent').innerHTML = `
      ${story.image ? `<img class="article-hero" src="${story.image}" alt="${story.headline}" onerror="this.style.display='none'">` : ''}
      <div class="article-body">
        <div class="article-source">${story.source}</div>
        <h1 class="article-headline">${story.headline}</h1>
        <div class="article-deck">${story.deck}</div>
        ${story.url ? `<a class="article-link" href="${story.url}" target="_blank" rel="noopener">Read original at ${story.source} →</a>` : ''}
      </div>`;
  }
}

function closeArticle() {
  document.getElementById('articlePage').classList.remove('open');
  document.getElementById('mainPage').style.display = 'block';
}

async function load(section) {
  current = section;
  document.getElementById('sectionTitle').textContent = LABELS[section] || section;
  document.getElementById('refreshBtn').disabled = true;
  document.getElementById('container').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading ${LABELS[section] || section}…</p>
    </div>`;

  try {
    const res = await fetch(`/api/news?section=${encodeURIComponent(section)}`);
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Server error');
    renderGrid(data.stories);
  } catch(err) {
    document.getElementById('container').innerHTML = `<div class="error">⚠ ${err.message}</div>`;
  } finally {
    document.getElementById('refreshBtn').disabled = false;
  }
}

function reload() { load(current); }
load('world');
</script>
</body>
</html>
